<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On The Move | Туризм</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="overlay"></div>
      <nav class="nav container">
        <div class="logo">On the Move</div>
        <ul class="menu nav-actions">
          <li><a href="#about">О нас</a></li>
          <li><a href="#countries">Топ стран</a></li>
          <li class="nav-auth-group">
            <button id="auth-btn" type="button" class="nav-btn nav-btn--primary" title="Войти или открыть профиль">Войти</button>
            <button id="logout-btn" type="button" class="nav-btn nav-btn--primary nav-btn--logout hidden">Выйти</button>
          </li>
        </ul>
      </nav>
      <div class="hero-content container">
        <h1 class="hero-title-animate">Путешествуй, чтобы жить</h1>
        <p class="hero-tagline-animate">Открой мир через новые впечатления</p>
      </div>
    </header>

    <main>
      <section id="countries" class="countries-section container">
        <h2>Топ-6 стран для путешествий</h2>
        <div id="countries-grid" class="countries-grid"></div>
      </section>

      <section id="about" class="about-section">
        <div class="container about-inner">
          <h2 class="about-heading">Почему путешествия меняют нас</h2>
          <p class="about-lead" id="about-lead" aria-live="polite" data-typewriter-text="Путешествия - это не просто смена обстановки. Это возможность выйти из зоны комфорта, увидеть мир другими глазами и обогатить внутренний мир. Каждое путешествие дарит новые знания, знакомства и воспоминания, которые остаются на всю жизнь."></p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 On the move — вдохновляйся и путешествуй</p>
    </footer>

    <div id="auth-modal" class="auth-modal hidden">
      <div class="auth-backdrop" data-close-auth="true"></div>
      <div class="auth-dialog">
        <h3 id="auth-title" class="auth-title">Вход</h3>
        <form id="auth-form" class="auth-form">
          <label for="auth-name" id="name-label" class="hidden">Имя</label>
          <input id="auth-name" class="hidden" type="text" placeholder="Ваше имя" />

          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" required />

          <label for="auth-password">Пароль</label>
          <input id="auth-password" type="password" placeholder="Минимум 6 символов" required />

          <button id="auth-submit" type="submit" class="auth-submit">Войти</button>
          <p id="auth-error" class="auth-error hidden"></p>
        </form>
        <button id="auth-switch-mode" class="auth-switch-mode" type="button">Нет аккаунта? Регистрация</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
