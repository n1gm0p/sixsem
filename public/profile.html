<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой профиль | On The Move</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./profile.css" />
  </head>
  <body class="profile-page">
    <div class="profile-layout">
      <header class="hero">
        <div class="overlay"></div>
        <nav class="nav container">
          <a class="logo" href="/">On the Move</a>
          <ul class="menu">
            <li><a href="/#about">О нас</a></li>
            <li><a href="/#countries">Топ стран</a></li>
            <li><a href="/">На главную</a></li>
            <li class="nav-auth-group">
              <button id="profile-logout-btn" type="button" class="nav-btn nav-btn--primary nav-btn--logout hidden">
                Выйти
              </button>
            </li>
          </ul>
        </nav>
        <div class="hero-content container profile-hero-content">
          <h1 class="hero-title-animate">Мой профиль</h1>
          <p id="profile-user" class="profile-user-tag hero-tagline-animate">Загрузка…</p>
        </div>
      </header>

      <main class="profile-main">
        <div class="profile-favorites-panel">
          <div class="profile-section-head">
            <h2>Избранные страны</h2>
            <p class="profile-section-sub">Сохранённые направления — откройте гид или добавьте новые на главной.</p>
          </div>
          <div id="favorites-content" class="countries-grid profile-favorites-grid"></div>
        </div>
      </main>

      <footer class="footer">
        <p>© 2026 On the move — вдохновляйся и путешествуй</p>
      </footer>
    </div>

    <script src="./profile.js"></script>
  </body>
</html>
